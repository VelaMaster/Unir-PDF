name: Build Windows installer

# Genera automáticamente el instalador .exe en un servidor Windows de GitHub
# cada vez que haces push a main o creas un tag.
#
# Para usarlo:
#   1. Sube este proyecto a un repo de GitHub.
#   2. Haz push. GitHub corre este workflow.
#   3. Ve a la pestaña Actions > último run > Artifacts > descarga "windows-installer".
#   4. Dentro está el .exe listo para distribuir.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Permite lanzarlo a mano desde la web

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B clean package

      - name: Prepare jpackage input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\input | Out-Null
          Copy-Item target\UnirPDF.jar build\input\UnirPDF.jar

      - name: Build .exe installer with jpackage
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name "Unir PDF" `
            --app-version 1.0.0 `
            --vendor "Diego Barrios" `
            --description "Aplicacion para unir PDFs de multiples carpetas" `
            --input build\input `
            --main-jar UnirPDF.jar `
            --main-class com.unirpdf.app.Main `
            --dest dist `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Unir PDF"

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error
